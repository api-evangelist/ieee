aid: ieee
name: IEEE Xplore
description: >-
  IEEE Xplore is the authoritative technical library operated by the Institute of Electrical and
  Electronics Engineers (IEEE), providing access to over 6 million documents spanning engineering,
  computer science, electronics, and technology. The IEEE Xplore API suite exposes a REST-based
  Metadata Search API for querying and retrieving abstracts and metadata across the full corpus,
  a DOI API for resolving up to 25 DOIs per request, an Open Access API for full-text retrieval
  of freely available articles, and a Full-Text Access API for institutional subscribers. API
  access requires key-based registration through the IEEE Developer Portal.
url: https://developer.ieee.org/
specificationVersion: '0.19'
created: '2026-06-13'
modified: '2026-06-13'
x-source: manual
x-type: commercial
x-category: Science & Math
x-tier: 2
x-tier-reason: IEEE Xplore is a major scholarly publisher with a public API requiring key registration; institutional subscription needed for full-text but metadata is broadly accessible.
tags:
  - Science And Math
  - Scholarly Publishing
  - Engineering
  - Computer Science
  - Standards
  - Research
  - Academic
  - Technology
apis:
  - name: IEEE Xplore Metadata Search API
    description: >-
      REST endpoint for querying and retrieving metadata records and abstracts for more than
      6 million documents in IEEE Xplore, including journals, conference proceedings, standards,
      books, and courses. Supports simple text search, Boolean operators (AND, OR, NOT), and
      fielded searches across article title, author, abstract, affiliation, publication title,
      DOI, ISBN, ISSN, article number, index terms, and more. Results are returned as JSON
      (default) or XML with a maximum of 200 records per request and pagination via start_record.
      API key required in every request via the apikey query parameter.
    humanURL: https://developer.ieee.org/docs
    baseURL: https://ieeexploreapi.ieee.org/api/v1/search/articles
    tags:
      - Science And Math
      - Scholarly Publishing
      - Engineering
      - Metadata
      - Search
    properties:
      - type: Documentation
        url: https://developer.ieee.org/docs
      - type: GettingStarted
        url: https://developer.ieee.org/getting_started
      - type: DeveloperPortal
        url: https://developer.ieee.org/
      - type: APIReference
        url: https://developer.ieee.org/docs/read/Searching_the_IEEE_Xplore_Metadata_API
      - type: SDKs
        url: https://developer.ieee.org/Python3_Software_Development_Kit
        title: Python 3 SDK
      - type: SDKs
        url: https://developer.ieee.org/Java_Software_Development_Kit
        title: Java SDK

  - name: IEEE Xplore DOI API
    description: >-
      Batch metadata lookup endpoint that accepts up to 25 DOI (Digital Object Identifier)
      numbers per request and returns metadata records including abstracts for each resolved
      document. Useful for enriching reference lists or citation databases. API key required.
    humanURL: https://developer.ieee.org/docs
    baseURL: https://ieeexploreapi.ieee.org/api/v1/search/articles
    tags:
      - Scholarly Publishing
      - DOI
      - Metadata
    properties:
      - type: Documentation
        url: https://developer.ieee.org/docs
      - type: DeveloperPortal
        url: https://developer.ieee.org/

  - name: IEEE Xplore Open Access API
    description: >-
      Full-text retrieval endpoint for articles designated as IEEE Open Access or chargeable
      open content. Returns complete article text for documents that are freely available under
      open-access licensing. Requires an API key and uses the article number as a required
      parameter to identify the target document.
    humanURL: https://developer.ieee.org/docs
    baseURL: https://ieeexploreapi.ieee.org/api/v1/search/articles
    tags:
      - Open Access
      - Full Text
      - Scholarly Publishing
    properties:
      - type: Documentation
        url: https://developer.ieee.org/docs
      - type: DeveloperPortal
        url: https://developer.ieee.org/

  - name: IEEE Xplore Full-Text Access API
    description: >-
      Full-text retrieval endpoint for chargeable IEEE articles accessible to institutional
      subscribers. Returns complete article content for documents covered under an organization's
      IEEE Xplore subscription. Requires both an API key and an institutional auth token.
      Article number is a required parameter.
    humanURL: https://developer.ieee.org/docs
    baseURL: https://ieeexploreapi.ieee.org/api/v1/search/articles
    tags:
      - Full Text
      - Scholarly Publishing
      - Subscription
    properties:
      - type: Documentation
        url: https://developer.ieee.org/docs
      - type: DeveloperPortal
        url: https://developer.ieee.org/

